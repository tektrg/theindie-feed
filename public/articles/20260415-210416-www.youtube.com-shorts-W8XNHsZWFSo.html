  <script>(function () {
  var buttons = document.querySelectorAll('[data-theme-choice]');
  var root = document.documentElement;

  function applyTheme(theme) {
    if (theme === 'system') {
      delete root.dataset.theme;
    } else {
      root.dataset.theme = theme;
    }

    buttons.forEach(function (button) {
      var isSelected = button.dataset.themeChoice === theme;
      button.setAttribute('aria-pressed', String(isSelected));
    });

    try {
      localStorage.setItem('indie-feed-theme', theme);
    } catch (error) {}
  }

  var initialTheme = 'system';
  try {
    var storedTheme = localStorage.getItem('indie-feed-theme');
    if (storedTheme === 'light' || storedTheme === 'dark' || storedTheme === 'system') {
      initialTheme = storedTheme;
    }
  } catch (error) {}

  applyTheme(initialTheme);

  buttons.forEach(function (button) {
    button.addEventListener('click', function () {
      applyTheme(button.dataset.themeChoice);
    });
  });
})();</script>
  <script>(function () {
  // E-reader friendly keyboard/button page-turn navigation
  function nextPage() {
    var overlap = 40;
    var amount = window.innerHeight - overlap;
    if (amount < 100) amount = window.innerHeight;
    
    if (window.scrollBy) {
      window.scrollBy(0, amount);
    } else {
      window.scrollTo(0, (window.pageYOffset || document.documentElement.scrollTop) + amount);
    }
  }

  function prevPage() {
    var overlap = 40;
    var amount = window.innerHeight - overlap;
    if (amount < 100) amount = window.innerHeight;
    
    if (window.scrollBy) {
      window.scrollBy(0, -amount);
    } else {
      window.scrollTo(0, (window.pageYOffset || document.documentElement.scrollTop) - amount);
    }
  }

  document.addEventListener('keydown', function (e) {
    // Skip if user is focusing an input field
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) {
      return;
    }

    switch (e.key) {
      case 'PageDown':
      case 'ArrowDown':
      case ' ': // Spacebar
      case 'ArrowRight':
        e.preventDefault();
        nextPage();
        break;
      case 'PageUp':
      case 'ArrowUp':
      case 'ArrowLeft':
        e.preventDefault();
        prevPage();
        break;
    }
  });
})();</script>
